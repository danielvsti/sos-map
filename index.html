<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const CONTROL_CENTER_CODE = "CC-VINA";
const MAP_STATE_URL = `https://sos.vsti.cl/dashboard/map-state?control_center_code=${CONTROL_CENTER_CODE}`;
const TICKET_URL = "https://sos.vsti.cl/tickets";
const SIREN_ACTIVATE_URL = "https://sos.vsti.cl/public/sirens/activate";
const SIREN_DEACTIVATE_URL = "https://sos.vsti.cl/public/sirens/deactivate";
const ACK_SOS_URL = "https://sos.vsti.cl/public/devices/ack-sos";
const ACK_MOBILE_SOS_URL = "https://sos.vsti.cl/public/mobile/ack";

const DEFAULT_CENTER = [-33.01895, -71.55090];
const DEFAULT_ZOOM = 15;

const map = L.map("map").setView(
	DEFAULT_CENTER,
	DEFAULT_ZOOM
	);
const ticketPanel = document.getElementById("ticketPanel");

L.DomEvent.disableClickPropagation(ticketPanel);
L.DomEvent.disableScrollPropagation(ticketPanel);



let mapInitialized = false;
let userMovedMap = false;


map.on("dragstart", () => {
	userMovedMap = true;
	});

map.on("zoomstart", () => {
	userMovedMap = true;
	});


L.control.zoom({ position: "topleft" }).addTo(map);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
attribution: "© OpenStreetMap"
}).addTo(map);

function getSosIcon(device) {
let cssClass = "sos-marker-normal";

if (device.sos_state === "ACTIVE") {
	cssClass = "sos-marker-active";
} else if (device.sos_state === "RECENT") {
	cssClass = "sos-marker-recent";
}

return L.divIcon({
className: "",
html: `<div class="${cssClass}">SOS</div>`,
iconSize: [60, 60],
iconAnchor: [30, 30]
});
}

const sirenIcon = L.divIcon({
className: "",
html: `<div class="siren-marker">📢</div>`,
iconSize: [44, 44],
iconAnchor: [22, 22]
});

const sirenActiveIcon = L.divIcon({
className: "",
html: `<div class="siren-marker-active">📢</div>`,
iconSize: [70, 70],
iconAnchor: [35, 35]
});

const mobileSosIcon = L.divIcon({
className: "",
html: `<div class="mobile-sos-marker">📱</div>`,
iconSize: [70, 70],
iconAnchor: [35, 35]
});

const deviceMarkers = {};
const sirenMarkers = {};
const mobileMarkers = {};
const resolverMarkers = {};
let selectedTicket = null;
let currentSirens = [];

async function activateSiren(sirenId) {
if (!confirm(`¿Activar ${sirenId} por 60 segundos?`)) return;

const res = await fetch(SIREN_ACTIVATE_URL, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
siren_id: sirenId,
duration_seconds: 60
})
});

const data = await res.json();

if (data.status === "ok") {
await loadMapState();
} else {
alert("Error activando sirena");
}
}

async function deactivateSiren(sirenId) {
const res = await fetch(SIREN_DEACTIVATE_URL, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ siren_id: sirenId })
});

const data = await res.json();

if (data.status === "ok") {
await loadMapState();
} else {
alert("Error apagando sirena");
}
}

async function ackSos(deviceId) {
const res = await fetch(ACK_SOS_URL, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
device_id: deviceId
})
});

const data = await res.json();

if (data.status === "ok") {
await loadMapState();
} else {
alert("No fue posible reconocer el SOS");
}
}

async function ackMobileSos(eventId) {
const res = await fetch(ACK_MOBILE_SOS_URL, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
event_id: eventId,
operator: "central-web"
})
});

const data = await res.json();

if (data.status === "ok") {
await loadMapState();
} else {
alert("No fue posible reconocer el SOS móvil");
}
}

function getTicketClass(ticket) {
  switch (ticket.state) {
    case "ACTIVE":
      return "ticket-active";

    case "ASSIGNED":
      return "ticket-assigned";

    case "ACKNOWLEDGED":
      return "ticket-acknowledged";

    default:
      return "ticket-default";
  }
}

function getTicketIcon(ticket) {
  const cssClass = getTicketClass(ticket);

  return L.divIcon({
    className: "",
    html: `<div class="${cssClass}">📱</div>`,
    iconSize: [52, 52],
    iconAnchor: [26, 26]
  });
}


function getResolverIcon(resolver) {

	let cssClass = "resolver-marker-available";

	if (resolver.status === "BUSY") {
		cssClass = "resolver-marker-busy";
	}

	if (resolver.status === "EN_ROUTE") {
		cssClass = "resolver-marker-enroute";
	}

	return L.divIcon({
className: "",
html: `<div class="${cssClass}">👮</div>`,
iconSize: [50, 50],
iconAnchor: [25, 25]
});
}


function renderDevice(device) {
	const name = device.name || `Botón SOS ${device.id}`;
	const icon = getSosIcon(device);

	const sosText =
		device.sos_state === "ACTIVE"
		? '<span style="color:#dc2626;font-weight:bold;">🚨 SOS ACTIVO</span>'
		: device.sos_state === "RECENT"
		? '<span style="color:#ea580c;font-weight:bold;">⚠️ SOS RECIENTE</span>'
		: '<span style="color:#15803d;font-weight:bold;">✅ NORMAL</span>';

	const popup = `
		<strong>${name}</strong><br>
		ID: ${device.id}<br>
		Estado SOS: ${sosText}<br>
		Estado dispositivo: ${device.online ? "Online" : "Offline"}<br>
		Último evento: ${device.last_event_type ?? "-"}<br>
		Latitud: ${device.latitude}<br>
		Longitud: ${device.longitude}<br>
		Velocidad: ${device.speed ?? "-"} km/h<br>
		Dirección: ${device.direction ?? "-"}°<br>
		Satélites: ${device.satellites ?? "-"}<br>
		GPS válido: ${device.valid ? "Sí" : "No"}<br>
		Última actualización: ${device.last_seen ?? "-"}<br>
		${
			device.sos_state === "ACTIVE" || device.sos_state === "RECENT"
				? `<br><button class="btn-siren btn-ack" onclick="ackSos('${device.id}')">
				✅ Marcar como atendido
				</button>`
				: ""
		}
	`;

	if (!deviceMarkers[device.id]) {
		deviceMarkers[device.id] = L.marker(
				[device.latitude, device.longitude],
				{ icon }
				).addTo(map);
	} else {
		deviceMarkers[device.id].setLatLng([
				device.latitude,
				device.longitude
		]);

		deviceMarkers[device.id].setIcon(icon);
	}

	deviceMarkers[device.id].bindPopup(popup);
}


function renderSiren(siren) {
  const active =
    siren.active === true ||
    siren.relay === true ||
    siren.state === "ON";

  const icon = active
    ? sirenActiveIcon
    : sirenIcon;

  const popup = `
    <strong>${siren.name}</strong><br>
    ID: ${siren.id}<br>
    Estado: ${
      active
        ? '<strong style="color:red;">ACTIVADA</strong>'
        : '<strong>Apagada</strong>'
    }<br>
    Ubicación: ${siren.location ?? "-"}<br>
    ${
      active
        ? `<button class="btn-siren btn-off" onclick="deactivateSiren('${siren.id}')">Apagar sirena</button>`
        : `<button class="btn-siren" onclick="activateSiren('${siren.id}')">🚨 Activar sirena 60s</button>`
    }
  `;

  if (!sirenMarkers[siren.id]) {
    sirenMarkers[siren.id] = L.marker(
      [siren.latitude, siren.longitude],
      { icon }
    ).addTo(map);
  } else {
    sirenMarkers[siren.id].setLatLng([
      siren.latitude,
      siren.longitude
    ]);

    sirenMarkers[siren.id].setIcon(icon);
  }

  sirenMarkers[siren.id].bindPopup(popup);
}




function renderTicket(ticket) {

  const icon = getTicketIcon(ticket);

  if (!mobileMarkers[ticket.id]) {

    mobileMarkers[ticket.id] = L.marker(
      [ticket.latitude, ticket.longitude],
      { icon }
    ).addTo(map);

    mobileMarkers[ticket.id].on(
      "click",
() => openTicketPanel(ticket.id)
);

} else {

mobileMarkers[ticket.id].setLatLng([
ticket.latitude,
ticket.longitude
]);

mobileMarkers[ticket.id].setIcon(icon);
}
}

function renderResolver(resolver) {

const popup = `
	<strong>👮 ${resolver.full_name}</strong><br>
	Estado: ${resolver.status}<br>
	Teléfono: ${resolver.phone ?? "-"}<br>
	Última actualización: ${resolver.updated_at}
`;

const icon = getResolverIcon(resolver);

if (!resolverMarkers[resolver.id]) {

	resolverMarkers[resolver.id] = L.marker(
			[resolver.latitude, resolver.longitude],
			{ icon }
			).addTo(map);

} else {

	resolverMarkers[resolver.id].setLatLng([
			resolver.latitude,
			resolver.longitude
	]);

	resolverMarkers[resolver.id].setIcon(icon);
}

resolverMarkers[resolver.id].bindPopup(popup);
}

function closeTicketPanel(event) {

if (event) {
	event.stopPropagation();
	event.preventDefault();
}

document
	.getElementById("ticketPanel")
	.classList.add("hidden");
}


function callCitizen() {
alert("Próximamente: llamada al vecino");
}

function callEmergencyContact() {
alert("Próximamente: llamada al contacto de emergencia");
}


function distanceMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = (v) => v * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLon / 2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}


async function activateNearestSiren() {

  if (!selectedTicket) {
    alert("No hay ticket seleccionado");
    return;
  }

  if (!currentSirens.length) {
    alert("No hay sirenas disponibles");
    return;
  }

  const nearest = currentSirens
    .map(siren => ({
      ...siren,
      distance: distanceMeters(
        Number(selectedTicket.latitude),
        Number(selectedTicket.longitude),
        Number(siren.latitude),
        Number(siren.longitude)
      )
    }))
    .sort((a, b) => a.distance - b.distance)[0];

  const ok = confirm(
    `¿Activar la sirena más cercana?\n\n${nearest.name}\nDistancia aproximada: ${Math.round(nearest.distance)} m`
  );

  if (!ok) return;

  const res = await fetch(SIREN_ACTIVATE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      siren_id: nearest.id,
      duration_seconds: 60
    })
  });

  const data = await res.json();

  if (data.status === "ok") {
    await loadMapState();
    alert(`Sirena activada: ${nearest.name}`);
  } else {
    alert("No fue posible activar la sirena");
  }
}





function formatDuration(ms) {

if (!ms || ms < 0) return "-";

const totalSeconds = Math.floor(ms / 1000);

const hours = Math.floor(totalSeconds / 3600);
const minutes = Math.floor((totalSeconds % 3600) / 60);
const seconds = totalSeconds % 60;

if (hours > 0) {
return `${hours}h ${minutes}m`;
}

return `${minutes}m ${seconds}s`;
}

function getSlaColor(minutes) {

if (minutes < 5) {
return "#16a34a";
}

if (minutes < 10) {
return "#ea580c";
}

return "#dc2626";
}



async function openTicketPanel(ticketId) {

try {

const res = await fetch(
		`${TICKET_URL}/${ticketId}`
		);

const data = await res.json();

const ticket = data.ticket;
 selectedTicket = ticket;	
const now = Date.now();

const createdAt = new Date(ticket.created_at).getTime();

const assignedAt = ticket.assigned_at
	? new Date(ticket.assigned_at).getTime()
	: null;

const resolvedAt = ticket.resolved_at
	? new Date(ticket.resolved_at).getTime()
	: null;

const totalElapsed = now - createdAt;

const assignmentTime =
	assignedAt
	? assignedAt - createdAt
	: null;

const resolutionTime =
	resolvedAt
	? resolvedAt - createdAt
	: null;

const elapsedMinutes = totalElapsed / 60000;

const slaColor = getSlaColor(elapsedMinutes);






document.getElementById(
		"ticketTitle"
		).textContent = `🚨 ${ticket.title}`;

const contactsHtml =
	data.emergency_contacts
	.map(c => `
			<div class="contact-card">
			<strong>${c.name}</strong><br>
			${c.relationship}<br>
			📞 ${c.phone}
			</div>
			`)
	.join("");

const notesHtml =
	data.notes
	.map(n => `
			<div class="timeline-item">
			<div>${n.note}</div>
			<div class="timeline-date">
			${n.author_name || "-"} ·
			${new Date(n.created_at).toLocaleString()}
			</div>
			</div>
			`)
	.join("");

const actionsHtml =
	data.actions

async function loadMapState() {
try {
const res = await fetch(MAP_STATE_URL);
const data = await res.json();

const devices = data.devices || [];
const sirens = data.sirens || [];
      currentSirens = sirens;
const tickets = data.tickets || [];
const resolvers = data.resolvers || [];


const visibleTickets = tickets.filter(
  t => !["CLOSED", "CANCELLED", "RESOLVED"].includes(t.state)
);


const activeSos = visibleTickets.filter(t =>
  !["RESOLVED", "CLOSED", "CANCELLED"].includes(t.state)
).length;

const recentSos = devices.filter(d =>
  d.sos_state === "RECENT"
).length;

const mobileSos = visibleTickets.length;



document.getElementById("status").textContent = "conectado";
document.getElementById("status").className = "online";
document.getElementById("count").textContent = devices.length;
document.getElementById("activeSosCount").textContent = activeSos;
document.getElementById("recentSosCount").textContent = recentSos;

document.getElementById("mobileSosCount").textContent = mobileSos;


document.getElementById("sirenCount").textContent = sirens.length;
document.getElementById("lastUpdate").textContent =
	new Date().toLocaleTimeString();
document.getElementById("totalNodes").textContent =
	devices.length +
	visibleTickets.length +
	sirens.length +
resolvers.length;

devices.forEach(renderDevice);
sirens.forEach(renderSiren);
visibleTickets.forEach(renderTicket);
resolvers.forEach(renderResolver);

if (!userMovedMap) {
const bounds = [];

visibleTickets.forEach(t => {
bounds.push([t.latitude, t.longitude]);
});

resolvers.forEach(r => {
bounds.push([r.latitude, r.longitude]);
});

devices.forEach(d => {
bounds.push([d.latitude, d.longitude]);
});

sirens.forEach(s => {
bounds.push([s.latitude, s.longitude]);
});

if (bounds.length > 0) {
map.fitBounds(bounds, {
padding: [50, 50],
maxZoom: 17
});

mapInitialized = true;
} else if (!mapInitialized) {
map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
mapInitialized = true;
}
}

const activeTicketKeys = new Set(
visibleTickets.map(t => t.id)
);

Object.keys(mobileMarkers).forEach(key => {
if (!activeTicketKeys.has(key)) {
map.removeLayer(mobileMarkers[key]);
delete mobileMarkers[key];
}
});








} catch (err) {
console.error(err);
document.getElementById("status").textContent = "error";
document.getElementById("status").className = "offline";
}
}

loadMapState();
setInterval(loadMapState, 3000);
</script>
