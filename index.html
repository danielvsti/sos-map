<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>VSTI SOS - Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body { margin: 0; height: 100%; font-family: Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }

    .panel {
      position: absolute;
      top: 28px;
      left: 32px;
      z-index: 999;
      background: white;
      padding: 18px 22px;
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,.25);
      font-size: 20px;
      min-width: 270px;
    }

    .online { color: green; font-weight: bold; }
    .offline { color: red; font-weight: bold; }

    .leaflet-control-zoom {
      margin-top: 210px !important;
      margin-left: 32px !important;
    }

    .sos-marker {
      background: #15803d;
      color: white;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
      font-weight: bold;
      font-size: 11px;
    }

    .siren-marker {
      background: #991b1b;
      color: white;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      font-size: 20px;
    }

    .siren-marker-active {
      background: #dc2626;
      color: white;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid white;
      font-size: 22px;
      animation: sirenPulse 1s infinite;
    }

    @keyframes sirenPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(220,38,38,.8);
        transform: scale(1);
      }
      70% {
        box-shadow: 0 0 0 28px rgba(220,38,38,0);
        transform: scale(1.12);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(220,38,38,0);
        transform: scale(1);
      }
    }

    .btn-siren {
      margin-top: 10px;
      background: #dc2626;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-off {
      background: #374151;
    }
  </style>
</head>

<body>
  <div class="panel">
    <strong>VS&TI SOS</strong><br>
    Estado: <span id="status" class="offline">cargando...</span><br>
    Dispositivos: <span id="count">0</span><br>
    Última actualización: <span id="lastUpdate">-</span>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const MAP_STATE_URL = "https://sos.vsti.cl/public/map-state";
    const SIREN_ACTIVATE_URL = "https://sos.vsti.cl/public/sirens/activate";
    const SIREN_DEACTIVATE_URL = "https://sos.vsti.cl/public/sirens/deactivate";

    const map = L.map("map", { zoomControl: false })
      .setView([-33.0189, -71.5475], 15);

    L.control.zoom({ position: "topleft" }).addTo(map);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap"
    }).addTo(map);

    const sosIcon = L.divIcon({
      className: "",
      html: `<div class="sos-marker">SOS</div>`,
      iconSize: [40, 40],
      iconAnchor: [20, 20]
    });

    const sirenIcon = L.divIcon({
      className: "",
      html: `<div class="siren-marker">🚨</div>`,
      iconSize: [44, 44],
      iconAnchor: [22, 22]
    });

    const sirenActiveIcon = L.divIcon({
      className: "",
      html: `<div class="siren-marker-active">🚨</div>`,
      iconSize: [70, 70],
      iconAnchor: [35, 35]
    });

    const deviceMarkers = {};
    const sirenMarkers = {};

    async function activateSiren(sirenId) {
      if (!confirm(`¿Activar ${sirenId} por 60 segundos?`)) return;

      const res = await fetch(SIREN_ACTIVATE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          siren_id: sirenId,
          duration_seconds: 60
        })
      });

      const data = await res.json();

      if (data.status === "ok") {
        await loadMapState();
      } else {
        alert("Error activando sirena");
      }
    }

    async function deactivateSiren(sirenId) {
      const res = await fetch(SIREN_DEACTIVATE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ siren_id: sirenId })
      });

      const data = await res.json();

      if (data.status === "ok") {
        await loadMapState();
      } else {
        alert("Error apagando sirena");
      }
    }

    function renderDevice(device) {
      const name = device.name || `Botón SOS ${device.id}`;

      const popup = `
        <strong>${name}</strong><br>
        ID: ${device.id}<br>
        Estado: ${device.online ? "Online" : "Offline"}<br>
        Latitud: ${device.latitude}<br>
        Longitud: ${device.longitude}<br>
        Velocidad: ${device.speed ?? "-"} km/h<br>
        Dirección: ${device.direction ?? "-"}°<br>
        Satélites: ${device.satellites ?? "-"}<br>
        GPS válido: ${device.valid ? "Sí" : "No"}<br>
        Última actualización: ${device.last_seen ?? "-"}
      `;

      if (!deviceMarkers[device.id]) {
        deviceMarkers[device.id] = L.marker(
          [device.latitude, device.longitude],
          { icon: sosIcon }
        ).addTo(map);
      } else {
        deviceMarkers[device.id].setLatLng([device.latitude, device.longitude]);
      }

      deviceMarkers[device.id].bindPopup(popup);
    }

    function renderSiren(siren) {
      const active = siren.active === true || siren.state === "ON";
      const icon = active ? sirenActiveIcon : sirenIcon;

      const popup = `
        <strong>${siren.name}</strong><br>
        ID: ${siren.id}<br>
        Estado: ${
          active
            ? '<strong style="color:red;">ACTIVADA</strong>'
            : '<strong>Apagada</strong>'
        }<br>
        Ubicación: ${siren.location ?? "-"}<br>
        ${
          active
            ? `<button class="btn-siren btn-off" onclick="deactivateSiren('${siren.id}')">Apagar sirena</button>`
            : `<button class="btn-siren" onclick="activateSiren('${siren.id}')">🚨 Activar sirena 60s</button>`
        }
      `;

      if (!sirenMarkers[siren.id]) {
        sirenMarkers[siren.id] = L.marker(
          [siren.latitude, siren.longitude],
          { icon }
        ).addTo(map);
      } else {
        sirenMarkers[siren.id].setLatLng([siren.latitude, siren.longitude]);
        sirenMarkers[siren.id].setIcon(icon);
      }

      sirenMarkers[siren.id].bindPopup(popup);
    }

    async function loadMapState() {
      try {
        const res = await fetch(MAP_STATE_URL);
        const data = await res.json();

        document.getElementById("status").textContent = "conectado";
        document.getElementById("status").className = "online";
        document.getElementById("count").textContent = data.devices?.length ?? 0;
        document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();

        (data.devices || []).forEach(renderDevice);
        (data.sirens || []).forEach(renderSiren);

      } catch (err) {
        console.error(err);
        document.getElementById("status").textContent = "error";
        document.getElementById("status").className = "offline";
      }
    }

    loadMapState();
    setInterval(loadMapState, 3000);
  </script>
</body>
</html>
