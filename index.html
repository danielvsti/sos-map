<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>VSTI SOS - Mapa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />


<style>
html, body { margin: 0; height: 100%; font-family: Arial, sans-serif; }
#map { height: 100vh; width: 100%; }

.panel {
position: absolute;
top: 28px;
left: 32px;
z-index: 999;
background: white;
padding: 18px 22px;
 border-radius: 18px;
 box-shadow: 0 4px 18px rgba(0,0,0,.25);
 font-size: 20px;
 min-width: 270px;
}

.online { color: green; font-weight: bold; }
.offline { color: red; font-weight: bold; }

.leaflet-control-zoom {
margin-top: 430px !important;
margin-left: 32px !important;
}

.logo-vsti {
width: 260px;
display: block;
margin: 0 auto 8px auto;
}

.panel-title {
text-align: center;
font-size: 20px;
font-weight: bold;
color: #374151;
margin-bottom: 10px;
}

.panel-small {
font-size: 18px;
}

.resolver-marker-available {
background: #16a34a;
color: white;
border-radius: 50%;
width: 38px;
height: 38px;
display: flex;
align-items: center;
justify-content: center;
border: 3px solid white;
font-size: 20px;
}

.resolver-marker-busy {
background: #ea580c;
color: white;
border-radius: 50%;
width: 42px;
height: 42px;
display: flex;
align-items: center;
justify-content: center;
border: 3px solid white;
font-size: 22px;
}

.resolver-marker-enroute {
background: #2563eb;
color: white;
border-radius: 50%;
width: 42px;
height: 42px;
display: flex;
align-items: center;
justify-content: center;
border: 3px solid white;
font-size: 22px;
}

.sos-marker-normal {
background: #15803d;
color: white;
border-radius: 50%;
width: 34px;
height: 34px;
display: flex;
 align-items: center;
justify-content: center;
border: 3px solid white;
box-shadow: 0 2px 8px rgba(0,0,0,.35);
font-weight: bold;
font-size: 11px;
}

.sos-marker-recent {
background: #ea580c;
color: white;
border-radius: 50%;
width: 38px;
height: 38px;
display: flex;
align-items: center;
justify-content: center;
border: 3px solid white;
box-shadow: 0 2px 10px rgba(0,0,0,.4);
font-weight: bold;
font-size: 11px;
}

.sos-marker-active {
background: #dc2626;
color: white;
border-radius: 50%;
width: 42px;
height: 42px;
display: flex;
align-items: center;
justify-content: center;
border: 3px solid white;
font-weight: bold;
font-size: 12px;
animation: sosPulse 1s infinite;
}

@keyframes sosPulse {
0% {
box-shadow: 0 0 0 0 rgba(220,38,38,.8);
transform: scale(1);
}
70% {
box-shadow: 0 0 0 28px rgba(220,38,38,0);
transform: scale(1.12);
}
100% {
box-shadow: 0 0 0 0 rgba(220,38,38,0);
transform: scale(1);
}
}

.siren-marker {
background: #991b1b;
color: white;
border-radius: 50%;
width: 38px;
height: 38px;
display: flex;
align-items: center;
justify-content: center;
border: 3px solid white;
box-shadow: 0 2px 8px rgba(0,0,0,.4);
font-size: 20px;
}

.siren-marker-active {
background: #dc2626;
color: white;
border-radius: 50%;
width: 42px;
height: 42px;
display: flex;
align-items: center;
justify-content: center;
border: 3px solid white;
font-size: 22px;
animation: sirenPulse 1s infinite;
}

@keyframes sirenPulse {
0% {
box-shadow: 0 0 0 0 rgba(220,38,38,.8);
transform: scale(1);
}
70% {
box-shadow: 0 0 0 28px rgba(220,38,38,0);
transform: scale(1.12);
}
100% {
box-shadow: 0 0 0 0 rgba(220,38,38,0);
transform: scale(1);
}
}

.btn-siren {
margin-top: 10px;
background: #dc2626;
color: white;
border: none;
padding: 8px 12px;
border-radius: 8px;
cursor: pointer;
font-weight: bold;
}

.btn-off {
background: #374151;
}

.btn-ack {
background: #15803d;
}

.mobile-sos-active {
background: #2563eb;
color: white;
border-radius: 50%;
width: 42px;
height: 42px;
display: flex;
align-items: center;
justify-content: center;
border: 3px solid white;
font-size: 22px;
animation: sosPulse 1s infinite;
}

.mobile-sos-ack {
background: #ca8a04;
color: white;
border-radius: 50%;
width: 42px;
height: 42px;
display: flex;
align-items: center;
justify-content: center;
border: 3px solid white;
font-size: 22px;
}

.mobile-sos-cancelled {
background: #6b7280;
color: white;
border-radius: 50%;
width: 42px;
height: 42px;
display: flex;
align-items: center;
justify-content: center;
border: 3px solid white;
font-size: 22px;
}







</style>
</head>

<body>

<div class="panel">

<img
src="logo-vsti.png"
alt="VS&TI"
class="logo-vsti"
>

<div class="panel-title">
Sistema SOS Municipal
</div>

<div class="panel-small">
Estado:
<span id="status" class="offline">cargando...</span>
</div>

<div class="panel-small">
Dispositivos:
<span id="count">0</span>
</div>

<div class="panel-small">
SOS activos:
<span id="activeSosCount">0</span>
</div>

<div class="panel-small">
SOS recientes:
<span id="recentSosCount">0</span>
</div>

<div class="panel-small">
SOS móviles:
<span id="mobileSosCount">0</span>
</div>

<div class="panel-small">
Sirenas:
<span id="sirenCount">0</span>
</div>

<div class="panel-small">
Actualizado:
<span id="lastUpdate">-</span>
</div>

<div class="panel-small">
Total nodos:
<span id="totalNodes">0</span>
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const CONTROL_CENTER_CODE = "CC-VINA";
const MAP_STATE_URL = `https://sos.vsti.cl/dashboard/map-state?control_center_code=${CONTROL_CENTER_CODE}`;
const SIREN_ACTIVATE_URL = "https://sos.vsti.cl/public/sirens/activate";
const SIREN_DEACTIVATE_URL = "https://sos.vsti.cl/public/sirens/deactivate";
const ACK_SOS_URL = "https://sos.vsti.cl/public/devices/ack-sos";
const ACK_MOBILE_SOS_URL = "https://sos.vsti.cl/public/mobile/ack";

const DEFAULT_CENTER = [-33.01895, -71.55090];
const DEFAULT_ZOOM = 15;

const map = L.map("map").setView(
DEFAULT_CENTER,
DEFAULT_ZOOM
);

let mapInitialized = false;
let userMovedMap = false;


map.on("dragstart", () => {
userMovedMap = true;
});

map.on("zoomstart", () => {
userMovedMap = true;
});


L.control.zoom({ position: "topleft" }).addTo(map);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
attribution: "© OpenStreetMap"
}).addTo(map);

function getSosIcon(device) {
let cssClass = "sos-marker-normal";

if (device.sos_state === "ACTIVE") {
cssClass = "sos-marker-active";
} else if (device.sos_state === "RECENT") {
cssClass = "sos-marker-recent";
}

return L.divIcon({
className: "",
html: `<div class="${cssClass}">SOS</div>`,
iconSize: [60, 60],
iconAnchor: [30, 30]
});
}

const sirenIcon = L.divIcon({
className: "",
html: `<div class="siren-marker">🚨</div>`,
iconSize: [44, 44],
iconAnchor: [22, 22]
});

const sirenActiveIcon = L.divIcon({
className: "",
html: `<div class="siren-marker-active">🚨</div>`,
iconSize: [70, 70],
iconAnchor: [35, 35]
});

const mobileSosIcon = L.divIcon({
className: "",
html: `<div class="mobile-sos-marker">📱</div>`,
iconSize: [70, 70],
iconAnchor: [35, 35]
});

const deviceMarkers = {};
const sirenMarkers = {};
const mobileMarkers = {};
const resolverMarkers = {};

async function activateSiren(sirenId) {
if (!confirm(`¿Activar ${sirenId} por 60 segundos?`)) return;

const res = await fetch(SIREN_ACTIVATE_URL, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
siren_id: sirenId,
duration_seconds: 60
})
});

const data = await res.json();

if (data.status === "ok") {
await loadMapState();
} else {
alert("Error activando sirena");
}
}

async function deactivateSiren(sirenId) {
const res = await fetch(SIREN_DEACTIVATE_URL, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ siren_id: sirenId })
});

const data = await res.json();

if (data.status === "ok") {
await loadMapState();
} else {
alert("Error apagando sirena");
}
}

async function ackSos(deviceId) {
const res = await fetch(ACK_SOS_URL, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
device_id: deviceId
})
});

const data = await res.json();

if (data.status === "ok") {
await loadMapState();
} else {
alert("No fue posible reconocer el SOS");
}
}

async function ackMobileSos(eventId) {
const res = await fetch(ACK_MOBILE_SOS_URL, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
event_id: eventId,
operator: "central-web"
})
});

const data = await res.json();

if (data.status === "ok") {
await loadMapState();
} else {
alert("No fue posible reconocer el SOS móvil");
}
}


function getTicketIcon(ticket) {

let cssClass = "mobile-sos-active";

if (
  ticket.state === "ACKNOWLEDGED" ||
  ticket.state === "ASSIGNED"
) {
  cssClass = "mobile-sos-ack";
}

if (
  ticket.state === "RESOLVED" ||
  ticket.state === "CLOSED"
) {
  cssClass = "mobile-sos-cancelled";
}

return L.divIcon({
  className: "",
  html: `<div class="${cssClass}">🚨</div>`,
  iconSize: [70, 70],
  iconAnchor: [35, 35]
});
}

function getResolverIcon(resolver) {

let cssClass = "resolver-marker-available";

if (resolver.status === "BUSY") {
  cssClass = "resolver-marker-busy";
}

if (resolver.status === "EN_ROUTE") {
  cssClass = "resolver-marker-enroute";
}

return L.divIcon({
  className: "",
  html: `<div class="${cssClass}">👮</div>`,
  iconSize: [50, 50],
  iconAnchor: [25, 25]
});
}


function renderDevice(device) {
const name = device.name || `Botón SOS ${device.id}`;
const icon = getSosIcon(device);

const sosText =
	device.sos_state === "ACTIVE"
	? '<span style="color:#dc2626;font-weight:bold;">🚨 SOS ACTIVO</span>'
	: device.sos_state === "RECENT"
	? '<span style="color:#ea580c;font-weight:bold;">⚠️ SOS RECIENTE</span>'
	: '<span style="color:#15803d;font-weight:bold;">✅ NORMAL</span>';

const popup = `
	<strong>${name}</strong><br>
	ID: ${device.id}<br>
	Estado SOS: ${sosText}<br>
	Estado dispositivo: ${device.online ? "Online" : "Offline"}<br>
	Último evento: ${device.last_event_type ?? "-"}<br>
	Latitud: ${device.latitude}<br>
	Longitud: ${device.longitude}<br>
	Velocidad: ${device.speed ?? "-"} km/h<br>
	Dirección: ${device.direction ?? "-"}°<br>
	Satélites: ${device.satellites ?? "-"}<br>
	GPS válido: ${device.valid ? "Sí" : "No"}<br>
	Última actualización: ${device.last_seen ?? "-"}<br>
	${
		device.sos_state === "ACTIVE" || device.sos_state === "RECENT"
			? `<br><button class="btn-siren btn-ack" onclick="ackSos('${device.id}')">
			✅ Marcar como atendido
			</button>`
			: ""
	}
`;

if (!deviceMarkers[device.id]) {
	deviceMarkers[device.id] = L.marker(
			[device.latitude, device.longitude],
			{ icon }
			).addTo(map);
} else {
	deviceMarkers[device.id].setLatLng([
			device.latitude,
			device.longitude
	]);

	deviceMarkers[device.id].setIcon(icon);
}

deviceMarkers[device.id].bindPopup(popup);
}

function renderSiren(siren) {
const active = siren.active === true || siren.state === "ON";
const icon = active ? sirenActiveIcon : sirenIcon;

const popup = `
	<strong>${siren.name}</strong><br>
	ID: ${siren.id}<br>
	Estado: ${
		active
			? '<strong style="color:red;">ACTIVADA</strong>'
			: '<strong>Apagada</strong>'
	}<br>
Ubicación: ${siren.location ?? "-"}<br>
	   ${
		   active
			   ? `<button class="btn-siren btn-off" onclick="deactivateSiren('${siren.id}')">Apagar sirena</button>`
			   : `<button class="btn-siren" onclick="activateSiren('${siren.id}')">🚨 Activar sirena 60s</button>`
	   }
   `;

   if (!sirenMarkers[siren.id]) {
	   sirenMarkers[siren.id] = L.marker(
			   [siren.latitude, siren.longitude],
			   { icon }
			   ).addTo(map);
   } else {
	   sirenMarkers[siren.id].setLatLng([
			   siren.latitude,
			   siren.longitude
	   ]);

	   sirenMarkers[siren.id].setIcon(icon);
   }

   sirenMarkers[siren.id].bindPopup(popup);
}



function renderTicket(ticket) {

const popup = `
<strong>🚨 ${ticket.title}</strong><br>
Estado: <strong>${ticket.state}</strong><br>
Tipo: ${ticket.alert_type}<br>
Vecino: ${ticket.citizen_name ?? "-"}<br>
Teléfono: ${ticket.citizen_phone ?? "-"}<br>
Resolutor: ${ticket.resolver_name ?? "Sin asignar"}<br>
Creado: ${ticket.created_at}<br>
`;

const icon = getTicketIcon(ticket);

if (!mobileMarkers[ticket.id]) {

  mobileMarkers[ticket.id] = L.marker(
    [ticket.latitude, ticket.longitude],
    { icon }
  ).addTo(map);

} else {

  mobileMarkers[ticket.id].setLatLng([
    ticket.latitude,
    ticket.longitude
  ]);

  mobileMarkers[ticket.id].setIcon(icon);
}

mobileMarkers[ticket.id].bindPopup(popup);
}


function renderResolver(resolver) {

const popup = `
<strong>👮 ${resolver.full_name}</strong><br>
Estado: ${resolver.status}<br>
Teléfono: ${resolver.phone ?? "-"}<br>
Última actualización: ${resolver.updated_at}
`;

const icon = getResolverIcon(resolver);

if (!resolverMarkers[resolver.id]) {

  resolverMarkers[resolver.id] = L.marker(
    [resolver.latitude, resolver.longitude],
    { icon }
  ).addTo(map);

} else {

  resolverMarkers[resolver.id].setLatLng([
    resolver.latitude,
    resolver.longitude
  ]);

  resolverMarkers[resolver.id].setIcon(icon);
}

resolverMarkers[resolver.id].bindPopup(popup);
}




async function loadMapState() {
try {
const res = await fetch(MAP_STATE_URL);
const data = await res.json();

const devices = data.devices || [];
const sirens = data.sirens || [];

const tickets = data.tickets || [];
const resolvers = data.resolvers || [];

const visibleTickets = tickets.filter(
  t => t.state !== "CLOSED"
);
const activeSos = devices.filter(d => d.sos_state === "ACTIVE").length;
const recentSos = devices.filter(d => d.sos_state === "RECENT").length;

const mobileSos = visibleTickets.length;
	document.getElementById("status").textContent = "conectado";
	document.getElementById("status").className = "online";
	document.getElementById("count").textContent = devices.length;
	document.getElementById("activeSosCount").textContent = activeSos;
	document.getElementById("recentSosCount").textContent = recentSos;

	document.getElementById("mobileSosCount").textContent = mobileSos;


	document.getElementById("sirenCount").textContent = sirens.length;
	document.getElementById("lastUpdate").textContent =
		new Date().toLocaleTimeString();
	document.getElementById("totalNodes").textContent =
devices.length +
visibleTickets.length +
sirens.length;

	devices.forEach(renderDevice);
	sirens.forEach(renderSiren);
visibleTickets.forEach(renderTicket);
resolvers.forEach(renderResolver);

if (!userMovedMap) {
  const bounds = [];
visibleTickets.forEach(t => {
bounds.push([t.latitude, t.longitude]);
resolvers.forEach(r => {
  bounds.push([r.latitude, r.longitude]);
});

});

  devices.forEach(d => {
bounds.push([d.latitude, d.longitude]);
});

sirens.forEach(s => {
bounds.push([s.latitude, s.longitude]);
});

if (bounds.length > 0) {
map.fitBounds(bounds, {
padding: [50, 50],
maxZoom: 17
});

mapInitialized = true;
} else if (!mapInitialized) {
map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
mapInitialized = true;
}
}


const activeTicketKeys = new Set(
  visibleTickets.map(t => t.id)
);

Object.keys(mobileMarkers).forEach(key => {

if (!activeTicketKeys.has(key)) {

map.removeLayer(mobileMarkers[key]);

delete mobileMarkers[key];
}
});


visibleTickets.forEach(renderTicket);
resolvers.forEach(renderResolver);


} catch (err) {
	console.error(err);
	document.getElementById("status").textContent = "error";
	document.getElementById("status").className = "offline";
}
}

loadMapState();
setInterval(loadMapState, 3000);
</script>
</body>
</html>
